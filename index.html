<!DOCTYPE html>

<head>
    <meta charset="utf-8">

    <style>
        /* Embedded minimal stylesheet for offline/static use */
        *{box-sizing:border-box;margin:0;padding:0}
        :root{--primary:#FFD700;--dark:#2c3e50;--light:#fff}
        body{font-family:Segoe UI,system-ui,Arial,sans-serif;line-height:1.4;color:var(--dark);background:#fff9e6;min-height:100vh;display:flex;flex-direction:column}
        header{background:linear-gradient(135deg,var(--primary),#FFA500);padding:2.5rem 1rem;text-align:center}
        .header-content h1{font-size:1.9rem}
        .subtitle{opacity:.95;font-size:1rem;margin-top:0.25rem}
        main{flex:1;padding:2rem 1rem;max-width:1200px;margin:0 auto;width:100%}
        .gallery-section{width:100%}

        .gallery-container{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            gap:1.25rem;
            align-items:stretch;
        }

        .gallery-item{overflow:hidden;border-radius:10px;box-shadow:0 6px 14px rgba(0,0,0,.08);background:#fff;display:block;height:0;padding-bottom:100%;position:relative}
        .gallery-item a{display:block;height:100%}
        .gallery-item img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}

        /* Lightbox (CSS-only using :target) */
        .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);align-items:center;justify-content:center;padding:1rem;z-index:999}
        .lightbox:target{display:flex}
        .lightbox img{max-width:calc(100% - 2rem);max-height:calc(100% - 2rem);object-fit:contain;box-shadow:0 10px 30px rgba(0,0,0,0.6);border-radius:6px}
        .lb-close{position:absolute;right:1rem;top:1rem;color:#fff;text-decoration:none;font-size:2rem;line-height:1;padding:0 0.25rem}

        footer{background:var(--dark);color:var(--light);text-align:center;padding:1.25rem;border-top:3px solid var(--primary)}

        @media(min-width:768px){
            .header-content h1{font-size:2.4rem}
            main{padding:3rem}
            .gallery-container{gap:1.75rem}
        }
    </style>
</head>
